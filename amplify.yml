version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env | grep -e NEXT_PUBLIC_BASE_URL -e GOOGLE_CLIENT_ID -e GOOGLE_CLIENT_SECRET -e NEXTAUTH_URL -e NEXTAUTH_SECRET >> .env.production
        - npm install --legacy-peer-deps --ignore-scripts
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
