version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env | grep -e NEXT_PUBLIC_ -e GOOGLE_CLIENT -e NEXTAUTH_ >> .env.production || true
        - npm install --legacy-peer-deps --ignore-scripts
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
